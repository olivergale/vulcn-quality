# manifold-eval — vulcn-quality CI gate.
#
# Thin caller of the shared `manifold-eval-gate` composite action's NODE profile
# (npm ci + tsc typecheck + eslint + vitest). The job name `manifold-eval` is the
# branch-protection required-check context.
#
# The library's own gate is fast + browser-free: it typechecks every surface
# (incl. the Playwright-coupled registration fns) and unit-tests the pure surface
# logic. The heavy Playwright/vitest-pool-workers execution runs in CONSUMER CI
# via the reusable tier workflows (VLCN-595), not here.

name: manifold-eval

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  manifold-eval:
    name: manifold-eval
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # This repo is PUBLIC (operator call 2026-06-10, VLCN-602: consumers
      # npm-install the git-dep anonymously) but the gate action lives in the
      # PRIVATE vulcn-manifold — public repos cannot resolve private actions
      # by reference, so check the action repo out via a read-only deploy key
      # and run it from the local path. Same SHA pin as before (doctrine C1).
      - name: Checkout manifold-eval-gate action (private repo, read-only key)
        uses: actions/checkout@v4
        with:
          repository: olivergale/vulcn-manifold
          ref: 915b0fa6545aee54adcce3916102102100769148
          ssh-key: ${{ secrets.MANIFOLD_GATE_SSH_KEY }}
          path: .manifold-gate
          persist-credentials: false

      - name: manifold-eval gate (node — vulcn-quality)
        uses: ./.manifold-gate/.github/actions/manifold-eval-gate
        with:
          runtime: node
          node-install: npm ci
          node-typecheck: npm run typecheck
          node-lint: npm run lint
          node-test: npm test
